<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japan Express 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const AddLocationModal = ({ isOpen, onClose, onAdd, type }) => {
            const [name, setName] = useState('');
            const [link, setLink] = useState('');
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
                        <h3 className="text-2xl font-black mb-6 text-zinc-900 italic uppercase">Ajouter {type}</h3>
                        <div className="space-y-4">
                            <input autoFocus className="w-full bg-zinc-100 border-none rounded-2xl p-4 outline-none" placeholder="Nom du lieu" value={name} onChange={(e) => setName(e.target.value)} />
                            <input className="w-full bg-zinc-100 border-none rounded-2xl p-4 outline-none" placeholder="Lien Maps ou Adresse" value={link} onChange={(e) => setLink(e.target.value)} />
                        </div>
                        <div className="flex gap-3 mt-8">
                            <button onClick={onClose} className="flex-1 py-4 font-semibold text-zinc-400">Annuler</button>
                            <button onClick={() => { if(name) { onAdd(name, link); setName(''); setLink(''); onClose(); } }} className="flex-1 bg-black text-white rounded-2xl py-4 font-bold shadow-lg">Enregistrer</button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [userData, setUserData] = useState(() => {
                const saved = localStorage.getItem('japan_trip_vfinal');
                return saved ? JSON.parse(saved) : {};
            });
            const [modalConfig, setModalConfig] = useState({ open: false, cityId: null, type: null });

            useEffect(() => {
                localStorage.setItem('japan_trip_vfinal', JSON.stringify(userData));
            }, [userData]);

            const addEntry = (cityId, category, name, link) => {
                const cityData = userData[cityId] || {};
                const categoryData = cityData[category] || [];
                setUserData({ ...userData, [cityId]: { ...cityData, [category]: [...categoryData, { name, link, id: Date.now() }] } });
            };

            const deleteEntry = (cityId, category, id) => {
                const updated = userData[cityId][category].filter(item => item.id !== id);
                setUserData({ ...userData, [cityId]: { ...userData[cityId], [category]: updated } });
            };

            const sections = [
                { id: 'tokyo', title: '🏙️ Tokyo', days: '4 jours', transport: 'Métro', activities: ['Shibuya', 'Shinjuku', 'Asakusa', 'TeamLab'] },
                { id: 'fuji', title: '🗻 Fuji', days: '2 jours', transport: 'Voiture', activities: ['Onsen privé', 'Tour des lacs'] },
                { id: 'kiso', title: '🥾 Kiso', days: '2 jours', transport: 'Roadtrip', activities: ['Magome → Tsumago'] },
                { id: 'kyoto', title: '⛩️ Kyoto', days: '4 jours', transport: 'Shinkansen', activities: ['Fushimi Inari', 'Pavillon d’Or', 'Uji Matcha'] },
                { id: 'hiroshima', title: '🕊️ Hiroshima', days: '2 jours', transport: 'Ferry', activities: ['Miyajima', 'Mémorial'] },
                { id: 'osaka', title: '🎮 Osaka', days: '4 jours', transport: 'Métro', activities: ['Nintendo World', 'Dotonbori'] },
            ];

            return (
                <div className="min-h-screen bg-zinc-100 text-zinc-900 pb-20">
                    <header className="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-zinc-200">
                        <div className="max-w-7xl mx-auto px-6 py-5 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                            <h1 className="text-2xl font-black italic tracking-tighter uppercase">🇯🇵 Japan Express</h1>
                        </div>
                    </header>
                    <main className="max-w-7xl mx-auto px-4 py-8 space-y-12">
                        <section className="bg-gradient-to-br from-zinc-900 to-black text-white rounded-[3rem] p-10 shadow-2xl">
                            <p className="uppercase tracking-[0.4em] text-[10px] font-black text-red-500 mb-2">Roadtrip + Shinkansen</p>
                            <h2 className="text-5xl font-black italic uppercase tracking-tighter">Japon 2026</h2>
                        </section>
                        {sections.map(city => (
                            <section id={city.id} key={city.id} className="bg-white rounded-[2.5rem] p-8 border border-zinc-200 shadow-lg">
                                <h2 className="text-3xl font-black italic uppercase mb-2 tracking-tighter">{city.title}</h2>
                                <p className="text-zinc-500 font-bold text-xs uppercase mb-8">{city.days} • {city.transport}</p>
                                <div className="grid lg:grid-cols-2 gap-6">
                                    {['Hébergements', 'Restaurants'].map(type => (
                                        <div key={type} className="bg-zinc-50 rounded-[2rem] p-6 border border-zinc-100">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="text-[10px] font-black uppercase tracking-widest text-zinc-400 italic">{type}</h3>
                                                <button onClick={() => setModalConfig({ open: true, cityId: city.id, type })} className="w-8 h-8 bg-black text-white rounded-full font-bold text-xl">+</button>
                                            </div>
                                            {(userData[city.id]?.[type] || []).map(item => (
                                                <div key={item.id} className="bg-white p-4 rounded-xl border border-zinc-100 shadow-sm flex justify-between items-center mb-2">
                                                    <div>
                                                        <div className="font-bold text-sm uppercase italic">{item.name}</div>
                                                        {item.link && <a href={`maps://?q=${encodeURIComponent(item.name + ' ' + item.link)}`} className="text-[10px] text-emerald-600 font-black">🗺️ PLANS</a>}
                                                    </div>
                                                    <button onClick={() => deleteEntry(city.id, type, item.id)} className="text-zinc-300">✕</button>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </main>
                    <AddLocationModal isOpen={modalConfig.open} type={modalConfig.type} onClose={() => setModalConfig({ open: false, cityId: null, type: null })} onAdd={(name, link) => addEntry(modalConfig.cityId, modalConfig.type, name, link)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
