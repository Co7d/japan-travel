<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tokyo - Japon 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">

    <div class="app-container">
        <!-- Back Button & Header -->
        <header class="city-header">
            <a href="index.html" class="back-link"><i data-lucide="chevron-left"></i> Retour</a>
            <h1>Tokyo</h1>
        </header>

        <!-- LOGEMENTS -->
        <section class="city-section">
            <div class="section-title">
                <i data-lucide="home"></i>
                <h2>Hébergement</h2>
            </div>
            <div class="card glass">
                <!-- AJOUTER HOTEL ICI -->
                <div class="item">
                    <div class="item-info">
                        <strong>Nom de l'Hôtel</strong>
                        <span>Adresse ou quartier</span>
                    </div>
                    <a href="https://maps.apple.com/?q=Nom+Hotel+Japan" class="map-btn">Plans</a>
                </div>
                <!-- FIN AJOUT HOTEL -->
            </div>
        </section>

        <!-- ACTIVITÉS -->
        <section class="city-section">
            <div class="section-title">
                <i data-lucide="map"></i>
                <h2>Activités prévues</h2>
            </div>
            <div class="card glass">
                <!-- AJOUTER ACTIVITÉ ICI -->
                <div class="item">
                    <div class="item-info">
                        <strong>Temple / Musée / Spot</strong>
                        <span>Description rapide</span>
                    </div>
                    <a href="https://maps.apple.com/?q=Lieu+Japon" class="map-btn">Plans</a>
                </div>
                <div class="item">
                    <div class="item-info">
                        <strong>Expérience</strong>
                        <span>Détail</span>
                    </div>
                    <a href="https://maps.apple.com/?q=Experience+Japon" class="map-btn">Plans</a>
                </div>
                <!-- FIN AJOUT ACTIVITÉ -->
            </div>
        </section>

        <!-- RESTAURANTS -->
        <section class="city-section">
            <div class="section-title">
                <i data-lucide="utensils"></i>
                <h2>Restaurants</h2>
            </div>
            <div class="card glass">
                <!-- AJOUTER RESTO ICI -->
                <div class="item">
                    <div class="item-info">
                        <strong>Nom du Restaurant</strong>
                        <span>Spécialité (ex: Ramen)</span>
                    </div>
                    <a href="https://maps.apple.com/?q=Resto+Japon" class="map-btn">Plans</a>
                </div>
                <!-- FIN AJOUT RESTO -->
            </div>
        </section>

        <!-- NOTES -->
        <section class="city-section">
            <div class="section-title">
                <i data-lucide="sticky-note"></i>
                <h2>Notes</h2>
            </div>
            <div class="card glass">
                <p class="note-text">Ajouter ici des infos importantes, codes d'entrée, ou rappels...</p>
            </div>
        </section>

    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
